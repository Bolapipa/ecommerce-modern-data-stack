ecommerce:
  target: dev

  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'ecommerce_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'ecommerce_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'ecommerce') }}"
      schema: staging
      threads: 4
